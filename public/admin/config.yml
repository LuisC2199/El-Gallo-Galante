# =============================================================================
# Decap CMS — El Gallo Galante
# =============================================================================
# Phase 1: Foundation — collections, fields, media paths.
# Phase 2: Hardened — editorial UX, hints, audit-verified field compatibility.
#
# This configuration mirrors the Astro content collections defined in
# src/content/config.ts. Every field name, type, and optionality was matched
# against the existing Zod schemas so that files created or edited through
# the CMS remain fully compatible with the Astro build.
#
# DEPLOYMENT: Cloudflare Pages (not Netlify).
# Authentication requires an external OAuth proxy — see docs/decap-cms-setup.md.
#
# VERIFIED (Phase 2 audit):
#   - category select values match z.enum(["Poesía","Narrativa","Crítica",
#     "Ensayo","Epistolario"]) exactly, including accents.
#   - author/traductor relation → value_field: "{{slug}}" produces the slug
#     string that Astro's reference("authors") and getEntry() expect.
#   - issue relation → value_field: "{{slug}}" produces the slug string
#     that post.data.issue stores (z.string(), compared via ===).
#   - featuredPostSlugs relation → value_field: "{{slug}}" produces the slug
#     string matched by posts.find(p => p.slug === slug) in templates.
#   - Issue cover images use /covers/... (not /issues/...) matching all
#     existing content. public/covers/ is the canonical directory.
#   - No Astro schema changes were required.
# =============================================================================

# ---------------------------------------------------------------------------
# Backend — GitHub
# ---------------------------------------------------------------------------
# TODO: Replace placeholder values before going live.
#   1. Set `repo` to "your-org/el-gallo-galante".
#   2. Set `base_url` to the URL of your OAuth authenticator
#      (e.g. a Cloudflare Worker running an OAuth proxy, or an external
#       service like https://github.com/sveltia/sveltia-cms-auth).
#   3. Uncomment `site_url` / `display_url` once the production URL is known.
#
# See docs/decap-cms-setup.md for full deployment instructions.
# ---------------------------------------------------------------------------
backend:
  name: github
  repo: LuisC2199/El-Gallo-Galante       # TODO: replace OWNER with GitHub org/user
  branch: main
  base_url: https://el-gallo-galante-cms-auth.luiscs210699.workers.dev  # TODO: external OAuth proxy
  # site_url: https://el-gallo-galante.pages.dev    # TODO: Cloudflare Pages URL
  # display_url: https://el-gallo-galante.pages.dev

# ---------------------------------------------------------------------------
# Global media (fallback)
# ---------------------------------------------------------------------------
# Per-collection media_folder overrides are set below so that uploads land
# in the correct public/ subdirectory. This global setting is the fallback
# for any field not covered by a collection-level override.
media_folder: "public/assets"
public_folder: "/assets"

# ---------------------------------------------------------------------------
# Locale
# ---------------------------------------------------------------------------
locale: "es"

# ---------------------------------------------------------------------------
# Slug rules
# ---------------------------------------------------------------------------
slug:
  encoding: "unicode"
  clean_accents: true
  sanitize_replacement: "-"

# =============================================================================
# Collections
# =============================================================================
collections:

  # ===========================================================================
  # ISSUES  (Números / Ediciones)
  # ===========================================================================
  # Schema source: src/content/config.ts → `issues` collection
  #
  # MEDIA: Existing cover images live in public/covers/ (paths like /covers/…).
  # This is intentional — the directory is called "covers", not "issues",
  # because all existing content already references /covers/... paths.
  # Do NOT change to /issues/ without migrating all existing references.
  # ---------------------------------------------------------------------------
  - name: "issues"
    label: "Números"
    label_singular: "Número"
    folder: "src/content/issues"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    media_folder: "/public/covers"
    public_folder: "/covers"
    description: "Cada número agrupa los textos publicados en una edición de la revista."
    fields:
      - label: "Título"
        name: "title"
        widget: "string"
        required: true
        hint: 'Nombre completo del número. Ej. "Año 2 número 3"'

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        required: true
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "Fecha de publicación del número."

      - label: "Número"
        name: "number"
        widget: "string"
        required: false
        hint: 'Formato breve para mostrar en la portada. Ej. "No. 01", "Vol. 2"'

      - label: "Imagen de portada"
        name: "coverImage"
        widget: "image"
        required: false
        hint: "Se sube a /covers/. Se muestra en la página del número y en el listado de ediciones."

      - label: "Descripción"
        name: "description"
        widget: "text"
        required: false
        hint: "Breve descripción del número. Se muestra debajo del título en la página de la edición."

      - label: "Posts destacados"
        name: "featuredPostSlugs"
        widget: "list"
        required: false
        hint: "Selecciona los textos que aparecerán destacados en la página de inicio cuando este sea el número más reciente. El orden importa."
        field:
          label: "Post"
          name: "post"
          widget: "relation"
          collection: "posts"
          search_fields: ["title"]
          value_field: "{{slug}}"
          display_fields: ["title"]

      - label: "Nota editorial"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Nota editorial opcional. Puede dejarse vacía si el número no la necesita."

  # ===========================================================================
  # AUTHORS  (Autores)
  # ===========================================================================
  # Schema source: src/content/config.ts → `authors` collection
  #
  # IMPORTANT: The author biography lives in the Markdown body, NOT in
  # frontmatter. The "Biografía" field below edits the body content.
  # This is intentional — Astro renders bios via author.render().
  # ---------------------------------------------------------------------------
  - name: "authors"
    label: "Autores"
    label_singular: "Autor"
    folder: "src/content/authors"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    media_folder: "/public/authors"
    public_folder: "/authors"
    description: "Perfiles de los autores y traductores que colaboran en la revista."
    fields:
      - label: "Nombre completo"
        name: "name"
        widget: "string"
        required: true
        hint: "Nombre tal como aparecerá en las publicaciones."

      - label: "Año de nacimiento"
        name: "birthYear"
        widget: "string"
        required: true
        hint: 'Texto libre. Ej. "1990" o "1986 - 2025" si el autor ya falleció.'

      - label: "Lugar de nacimiento"
        name: "birthPlace"
        widget: "string"
        required: true
        hint: 'Ciudad o estado. Ej. "Ciudad de México", "Estado de México"'

      - label: "Foto"
        name: "photo"
        widget: "image"
        required: false
        hint: "Foto del autor. Se sube a /authors/. Se muestra en la página del texto y en el perfil."

      - label: "Género"
        name: "gender"
        widget: "boolean"
        required: false
        hint: 'Se usa para mostrar "Sobre el autor" o "Sobre la autora". Activado = masculino, desactivado = femenino.'

      - label: "Redes sociales"
        name: "social"
        widget: "object"
        required: false
        collapsed: true
        hint: "Despliega para editar los enlaces de redes sociales del autor."
        fields:
          - { label: "Sitio web",    name: "website",   widget: "string", required: false, hint: "URL completa del sitio personal." }
          - { label: "Instagram",    name: "instagram",  widget: "string", required: false, hint: "Nombre de usuario o URL." }
          - { label: "X (Twitter)",  name: "x",          widget: "string", required: false, hint: "Nombre de usuario o URL." }
          - { label: "Facebook",     name: "facebook",   widget: "string", required: false, hint: "URL del perfil." }
          - { label: "TikTok",       name: "tiktok",     widget: "string", required: false, hint: "Nombre de usuario o URL." }

      - label: "Biografía"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Semblanza del autor en prosa. Este texto se muestra al pie de cada publicación y en la página del autor. Es el contenido Markdown del archivo, NO un campo del frontmatter."

  # ===========================================================================
  # POSTS  (Publicaciones)
  # ===========================================================================
  # Schema source: src/content/config.ts → `posts` collection
  #
  # RELATIONS (verified Phase 2):
  #   `author` / `traductor` → value_field: "{{slug}}" outputs the slug
  #   string that Astro's reference("authors") stores and getEntry() reads.
  #   `issue` → value_field: "{{slug}}" outputs the issue slug string
  #   matched via === in templates (z.string() in schema, NOT reference()).
  # ---------------------------------------------------------------------------
  - name: "posts"
    label: "Publicaciones"
    label_singular: "Publicación"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    media_folder: "/public/posts"
    public_folder: "/posts"
    description: "Textos publicados en la revista: poesía, narrativa, crítica, ensayo y epistolario."
    fields:
      - label: "Título"
        name: "title"
        widget: "string"
        required: true

      - label: "Fecha de publicación"
        name: "date"
        widget: "datetime"
        required: true
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Categoría"
        name: "category"
        widget: "select"
        required: true
        hint: "Sección de la revista a la que pertenece el texto."
        options:
          - "Poesía"
          - "Narrativa"
          - "Crítica"
          - "Ensayo"
          - "Epistolario"

      - label: "Número"
        name: "issue"
        widget: "relation"
        collection: "issues"
        search_fields: ["title", "number"]
        value_field: "{{slug}}"
        display_fields: ["title"]
        required: true
        hint: "Edición de la revista en la que se publica este texto."

      - label: "Autor"
        name: "author"
        widget: "relation"
        collection: "authors"
        search_fields: ["name"]
        value_field: "{{slug}}"
        display_fields: ["name"]
        required: true
        hint: "Autor principal del texto. Debe existir primero en la colección de Autores."

      - label: "Traductor"
        name: "traductor"
        widget: "relation"
        collection: "authors"
        search_fields: ["name"]
        value_field: "{{slug}}"
        display_fields: ["name"]
        required: false
        hint: "Solo si el texto es una traducción. El traductor debe existir en la colección de Autores."

      - label: "Extracto"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Resumen breve que aparece en las vistas previas. Si se deja vacío, no se muestra extracto."

      - label: "Imagen de portada"
        name: "coverImage"
        widget: "image"
        required: false
        hint: "Imagen que se muestra en las tarjetas de vista previa y en el carrusel de inicio. Se sube a /posts/."

      - label: "Imagen destacada"
        name: "featuredImage"
        widget: "image"
        required: false
        hint: "Imagen grande al inicio del artículo. Puede ser la misma que la imagen de portada."

      - label: "Posición de imagen"
        name: "imagePosition"
        widget: "select"
        required: false
        hint: "Punto focal de la imagen cuando se recorta. Ej. un retrato puede necesitar 'Arriba'."
        default: "center"
        options:
          - { label: "Arriba", value: "top" }
          - { label: "Centro", value: "center" }
          - { label: "Abajo",  value: "bottom" }

      - label: "Contenido"
        name: "body"
        widget: "markdown"
        hint: "Cuerpo del texto. Para poesía: usa saltos de línea (Enter) entre versos y líneas vacías entre estrofas. Para HTML especial como firmas, usa <p class=\"poem-signature\">Texto</p>."
